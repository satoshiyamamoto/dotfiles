"$schema" = 'https://starship.rs/config-schema.json'


format = """
[вЦСвЦТвЦУ](#a3aed2)\
[ оЬС ](bg:#a3aed2 fg:#090c0c)\
${env_var.ZMX_SESSION}\
$hostname\
[оВі](bg:#769ff0 fg:#a3aed2)\
$directory\
$direnv\
[оВі](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оВі](fg:#394260 bg:#212736)\
$jobs\
[оВі](fg:#212736 bg:#1d2230)\
[оВі ](fg:#1d2230)\
\n$character"""


[hostname]
style = "bg:#a3aed2 fg:#090c0c"
format = '[$hostname]($style)'
trim_at = ".local"
ssh_only = true

[env_var.ZMX_SESSION]
symbol = "пД† "
format = "[ $symbol$env_value ]($style)"
description = "zmx session name"
style = "bg:#a3aed2 fg:#090c0c"

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 1
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[direnv]
disabled = false
symbol = "у∞М™"
style = "fg:#e3e5e5 bg:#769ff0"
format = '[$symbol ]($style)'

[git_branch]
symbol = "пРШ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[jobs]
disabled = false
symbol = "оЂЄ"
format = '[ $symbol $number]($style)'
style = "bg:#212736"
