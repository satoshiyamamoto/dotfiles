[hostname]
style = "bg:#a3aed2 fg:#090c0c"
format = '[$hostname]($style)'
trim_at = ".local"
ssh_only = true

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "â€¦/"
truncate_to_repo = false
substitutions = [
  { from = "^.*/src/[^/]+(?:/[^/]+)*/([^/]+)/\\.worktrees/[^/]+(/.*)?$", to = "â€¦/$1$2", regex = true },
  { from = "^.*/src/[^/]+/[^/]+/([^/]+)(/.*)?$", to = "â€¦/$1$2", regex = true },
  { from = "Desktop", to = "ï„ˆ " },
  { from = "Documents", to = "َ°²‚ " },
  { from = "Downloads", to = "َ°‰چ " },
  { from = "Music", to = "َ±چ™ " },
  { from = "Pictures", to = "َ°‰ڈ " },
  { from = "Projects", to = "َ±§¼ " },
]

[direnv]
disabled = false
symbol = "َ±‚€ "
style = "fg:#e3e5e5 bg:#769ff0"
format = '[$symbol ]($style)'

[git_branch]
symbol = "ïگک"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[jobs]
disabled = false
symbol = "î«¸"
format = '[ $symbol $number]($style)'
style = "bg:#212736"

[fill]
symbol = " "

[cmd_duration]
format = '[took $duration]($style)'

[python]
disabled = false
symbol = "َ°Œ "
style = "bg:#1d2230"
format = '[[ $symbol $pyenv_prefix($version) (\($virtualenv\) )](fg:#769ff0 bg:#1d2230)]($style)'

[docker_context]
disabled = true
symbol = "َ°،¨"
style = "bg:#212736"
format = '[[ $symbol $context ](fg:#769ff0 bg:#212736)]($style)'

[kubernetes]
disabled = true
symbol = "َ±ƒ¾"
style = "bg:#212736"
format = '[[ $symbol $context( \($namespace\)) ](fg:#769ff0 bg:#212736)]($style)'

[aws]
disabled = false
symbol = "ïƒ¯ "
style = "fg:#769ff0 bg:#394260"
format = '[ $symbol $profile ]($style)'

[gcloud]
disabled = true
symbol = "َ±‡¶"
style = "fg:#769ff0 bg:#394260"
format = '[ $symbol $project ]($style)'

[battery]
format = "[$symbol[$percentage](fg:#e3e5e5 bg:#394260) ]($style)"

[[battery.display]]
threshold = 20
style = "fg:red bg:#394260"
discharging_symbol = "َ°پ؛ "

[time]
disabled = false
time_format = "%T"
style = "fg:#090c0c bg:#a3aed2"
format = '[ $time ïگ؛ ]($style)'

[env_var.ZMX_SESSION]
symbol = "â§– "
format = "[ $symbol$env_value ]($style)"
description = "zmx session name"
style = "bg:#a3aed2 fg:#090c0c"

[custom.git_worktree]
description = "Show an icon when inside a linked git worktree"
command = "printf ''"
when = "test \"$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)\" != \"$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)\""
require_repo = true
symbol = "َ°Œ¹ "
style = "fg:#769ff0 bg:#394260"
format = '[$symbol ]($style)'

[custom.vpn]
disabled = true
command = "~/Projects/src/github.com/satoshiyamamoto/starship-vpn/starship-vpn.sh prompt"
when = "~/Projects/src/github.com/satoshiyamamoto/starship-vpn/starship-vpn.sh connected"
symbol = "ï€£"
style = "bg:#394260"
format = '[[ $symbol $output ](fg:#769ff0 bg:#394260)]($style)'
ignore_timeout = true
