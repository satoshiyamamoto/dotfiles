git:
  pagers:
    - pager: delta --dark --paging=never --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}" --file-style="omit"
gui:
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#ff9e64"
      - "bold"
    inactiveBorderColor:
      - "#27a1b9"
    searchingActiveBorderColor:
      - "#ff9e64"
      - "bold"
    optionsTextColor:
      - "#7aa2f7"
    selectedLineBgColor:
      - "#283457"
    cherryPickedCommitFgColor:
      - "#7aa2f7"
    cherryPickedCommitBgColor:
      - "#bb9af7"
    markedBaseCommitFgColor:
      - "#7aa2f7"
    markedBaseCommitBgColor:
      - "#e0af68"
    unstagedChangesColor:
      - "#db4b4b"
    defaultFgColor:
      - "#c0caf5"
notARepository: quit
customCommands:
  - key: <c-g>
    context: files
    description: AI commit message (Claude Haiku)
    command: >-
      git diff --cached |
      CLAUDECODE= MAX_THINKING_TOKENS=0
      claude -p
      --no-session-persistence
      --model haiku
      --tools=''
      --disable-slash-commands
      --setting-sources=''
      --system-prompt=''
      'Generate ONLY a one-line Git commit message following Conventional Commits format
      (type(scope): description). Types: feat, fix, docs, style, refactor, test, chore.
      Based strictly on the diff from stdin. Output ONLY the message, nothing else.'
      | git commit -e -F -
    output: terminal
    loadingText: Generating commit message...
