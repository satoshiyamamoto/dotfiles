worktree-path = "{{ repo_path }}/.worktrees/{{ branch | sanitize }}"

[commit.generation]
command = "CLAUDECODE= MAX_THINKING_TOKENS=0 claude -p --no-session-persistence --model haiku --tools='' --disable-slash-commands --setting-sources='' --system-prompt='' 'Generate ONLY a one-line Git commit message following Conventional Commits format (type(scope): description). Types: feat, fix, docs, style, refactor, test, chore. Based strictly on the diff from stdin. Output ONLY the message, nothing else.'"

[post-start]
copy-env = "cp {{ primary_worktree_path }}/.env* {{ worktree_path }}/ 2>/dev/null || true"

[post-remove]
merge-claude-sessions = """
worktree=$HOME/.claude/projects/$(printf %s {{ worktree_path }} | sed 's/[^a-zA-Z0-9]/-/g')
primary=$HOME/.claude/projects/$(printf %s {{ primary_worktree_path }} | sed 's/[^a-zA-Z0-9]/-/g')
[ -d "$worktree" ] && [ "$worktree" != "$primary" ] || exit 0
mkdir -p "$primary"
find "$worktree" -maxdepth 1 -name '*.jsonl' -exec cp -n {} "$primary/" \\;
"""
